<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GEARSOULS | Account</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<!-- ================= NAVBAR ================= -->
<header class="navbar">
  <a href="index.html" class="brand">
    <img src="img/0000.jpeg" class="brand-logo" alt="GearSouls">
    <span class="brand-text">GEARSOULS</span>
  </a>
  <nav class="nav">
    <a href="index.html" class="nav-link">HOME</a>
    <a href="shop.html" class="nav-link">SHOP</a>
    <a href="account.html" class="nav-link active">ACCOUNT</a>
  </nav>
  <div class="menu-toggle">
    <i class="fas fa-bars"></i>
  </div>
</header>

<!-- ================= ACCOUNT ================= -->
<div class="account-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <img src="img/0000.jpeg" alt="GearSouls" class="auth-logo">
      <h1 class="auth-title">GEARSOULS</h1>
      <div class="auth-subtitle">MEMBER ACCESS</div>
    </div>
    
    <!-- SIGN IN FORM -->
    <div class="auth-form active" id="signinForm">
      <h3>SIGN IN</h3>
      <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" id="signinEmail" placeholder="EMAIL">
      </div>
      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="signinPassword" placeholder="PASSWORD">
        <i class="fas fa-eye toggle-password"></i>
      </div>
      <div class="form-options">
        <label class="checkbox-container">
          <input type="checkbox" checked>
          <span class="checkmark"></span>
          <span>REMEMBER</span>
        </label>
        <span class="forgot-link" onclick="showForm('reset')">FORGOT?</span>
      </div>
      <button class="auth-btn" onclick="login()">SIGN IN</button>
      <div class="auth-switch">
        <span>NO ACCOUNT?</span>
        <span class="switch-link" onclick="showForm('signup')">CREATE ONE</span>
      </div>
    </div>
    
    <!-- SIGN UP FORM -->
    <div class="auth-form" id="signupForm">
      <h3>CREATE ACCOUNT</h3>
      <div class="input-group">
        <i class="fas fa-user"></i>
        <input type="text" id="signupName" placeholder="NAME">
      </div>
      <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" id="signupEmail" placeholder="EMAIL">
      </div>
      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="signupPassword" placeholder="PASSWORD">
      </div>
      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="signupConfirm" placeholder="CONFIRM PASSWORD">
      </div>
      <div class="form-options">
        <label class="checkbox-container">
          <input type="checkbox">
          <span class="checkmark"></span>
          <span>ACCEPT TERMS</span>
        </label>
      </div>
      <button class="auth-btn" onclick="signup()">CREATE</button>
      <div class="auth-switch">
        <span>HAVE ACCOUNT?</span>
        <span class="switch-link" onclick="showForm('signin')">SIGN IN</span>
      </div>
    </div>
    
    <!-- RESET PASSWORD FORM -->
    <div class="auth-form" id="resetForm">
      <h3>RESET PASSWORD</h3>
      <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" id="resetEmail" placeholder="EMAIL">
      </div>
      <p style="text-align: center; color: #666; margin: 20px 0; font-size: 0.8rem;">A reset link will be sent to your email</p>
      <button class="auth-btn" onclick="resetPassword()">SEND</button>
      <div class="auth-switch">
        <span class="switch-link" onclick="showForm('signin')">BACK TO LOGIN</span>
      </div>
    </div>
    
    <!-- USER STATUS -->
    <div class="user-status" id="userStatus">NOT CONNECTED</div>
  </div>
</div>

<!-- ================= NOTIFICATION ================= -->
<div class="shop-notification">
  <i class="fas fa-check"></i>
  <span></span>
</div>

<!-- ================= SCROLL TOP ================= -->
<div class="scroll-top">
  <i class="fas fa-arrow-up"></i>
</div>

<script type="module" src="app.js"></script>

</body>
</html>
